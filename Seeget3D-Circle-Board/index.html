<!DOCTYPE html>
<html>

<head>
	<link rel="stylesheet" href="main.css" />
	<meta name="description" content="Generate encoded circular meta-board patterns for printing">
	<meta name="keywords" content="Meta-Board, marker, generate, print, computer vision, robotics">
	<link rel="icon" type="image/png" href="favicon.png">
	<title>Meta-Board Online Generator</title>
</head>

<body>
	<h1 class="title">Meta-Board Online Generator</h1>

	<form class="setup">
		<div class="field">
			<label for="frm-encoding-type">Encoding type</label>
			<select id="frm-encoding-type" name="encoding-type">
				<option selected value="30">8bit(30°)</option>
				<option value="20">16bit(20°)</option>
			</select>
		</div>
		<div class="field">
			<label for="frm-margin">Margin, mm</label>
			<input id="frm-margin" name="margin" type="number" min="0" max="1000" value="30">
		</div>
		<div class="field">
			<label for="frm-radius">Outer Circle Radius, mm</label>
			<input id="frm-radius" name="radius" type="number" min="1" max="10000" value="60">
		</div>
		<div class="field">
			<label for="frm-outer-ratio">Outer Circle Ratio</label>
			<input id="frm-outer-ratio" name="outer-ratio" type="number" min="1" max="10000" value="20">
		</div>
		<div class="field">
			<label for="frm-top-left-white-ratio">Top Left White Circle Ratio</label>
			<input id="frm-top-left-white-ratio" name="top-left-white-ratio" type="number" min="0" max="10000" value="10">
		</div>
		<div class="field">
			<label for="frm-other-white-ratio">Other White Circle Ratio</label>
			<input id="frm-other-white-ratio" name="other-white-ratio" type="number" min="0" max="10000" value="4">
		</div>
		<div class="field">
			<label for="frm-center-ring-outer-ratio">Center Ring Outer Ratio</label>
			<input id="frm-center-ring-outer-ratio" name="center-ring-outer-ratio" type="number" min="0" max="10000" value="45">
		</div>
		<div class="field">
			<label for="frm-center-ring-inner-ratio">Center Ring Inner Ratio</label>
			<input id="frm-center-ring-inner-ratio" name="center-ring-inner-ratio" type="number" min="0" max="10000" value="38">
		</div>
		<div class="field">
			<label for="frm-center-outer-circle-ratio">Center Outer Circle Ratio</label>
			<input id="frm-center-outer-circle-ratio" name="center-outer-circle-ratio" type="number" min="0" max="10000" value="70">
		</div>
		<div class="field sector-code-field">
			<label for="frm-encoding-code">Encoding code</label>
			<input id="frm-encoding-code" name="encoding-code" type="number" min="1" max="255" step="1" value="171">
			<span class="binary-code single-binary-code"></span>
		</div>
	</form>

	<div style="text-align: center;">
		<div class="marker"></div>
	</div>

	<div class="tools">
		Save Marker Info as <a href="" class="svg-button">SVG</a>,
		<a href="javascript:void(0);" class="pdf-button">PDF</a> or
		<a href="javascript:void(0);" class="json-button">JSON</a>.
	</div>

	<form class="setup">
		<div class="field sector-code-field">
			<label for="frm-started-id">Started ID</label>
			<input id="frm-started-id" name="started-id" type="number" min="1" max="255" step="1" value="1">
			<span class="binary-code multi-binary-code"></span>
		</div>
		<div class="field">
			<label for="frm-row">Rows</label>
			<input id="frm-row" name="row" type="number" min="1" max="50" value="1">
		</div>
		<div class="field">
			<label for="frm-col">Columns</label>
			<input id="frm-col" name="col" type="number" min="1" max="50" value="2">
		</div>
		<div class="field">
			<label for="frm-gapH">Horizontal Spacing, mm</label>
			<input id="frm-gapH" name="gapH" type="number" min="0" max="1000" value="10">
		</div>
		<div class="field">
			<label for="frm-gapV">Vertical Spacing, mm</label>
			<input id="frm-gapV" name="gapV" type="number" min="0" max="1000" value="10">
		</div>
	</form>

	<div style="text-align: center;">
		<div class="multi-marker"></div>
	</div>

	<div class="tools">
		Save Marker Info as <a href="" class="multi-svg-button">SVG</a>,
		<a href="javascript:void(0);" class="multi-pdf-button">PDF</a> or
		<a href="javascript:void(0);" class="multi-json-button">JSON</a>.
	</div>

	<form class="setup">
		<div class="field">
			<label for="frm-batch-start">Start ID</label>
			<input id="frm-batch-start" name="batch-start" type="number" min="1" max="255" step="1" value="1">
		</div>
		<div class="field">
			<label for="frm-batch-end">End ID</label>
			<input id="frm-batch-end" name="batch-end" type="number" min="2" max="256" step="1" value="2">
		</div>
	</form>

	<div style="text-align: center;">
		<div class="batch-marker"></div>
	</div>

	<div class="tools">
		Save Marker Info as <a href="javascript:void(0);" class="batch-control-button">SVG</a>
		<a href="javascript:void(0);" class="batch-svg-button"></a> or
		<a href="javascript:void(0);" class="batch-pdf-button">PDF</a>.
	</div>

	<script src="libs/jspdf.umd.min.js"></script>
	<script src="libs/svg2pdf.umd.min.js"></script>
	<script src="marker.js"></script>
	<script src="main.js"></script>
</body>

</html>
